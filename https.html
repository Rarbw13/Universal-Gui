<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon Script Vault V2</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { color: #ff0000; margin: 0; text-shadow: 0 0 10px #ff0000; }

        /* Form Input */
        .input-section {
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .add-btn {
            background: #ff0000;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #ff0000;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* List Script */
        .script-card {
            background: #151515;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info h3 { margin: 0; color: #ff0000; }
        
        .action-btns { display: flex; gap: 10px; }

        .copy-btn { background: #0078ff; color: white; border: none; padding: 8px 12px; border-radius: 5px; }
        .del-btn { background: #333; color: #ff4444; border: none; padding: 8px 12px; border-radius: 5px; }

        #toast {
            visibility: hidden;
            background-color: #ff0000;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 10px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>

    <div class="header">
        <h1>AXON SCRIPT VAULT</h1>
        <p style="font-size: 11px; color: #888;">Local Storage Mode</p>
    </div>

    <div class="input-section">
        <input type="text" id="scriptName" placeholder="Name of Script">
        <textarea id="scriptCode" placeholder="Paste Script Here..." rows="3"></textarea>
        <button class="add-btn" onclick="addScript()">ADD TO LIST</button>
    </div>

    <input type="text" class="search-bar" placeholder="Search your Script..." id="searchInput">

    <div id="scriptList">
        </div>

    <div id="toast">Succes!</div>

    <script>
        let scripts = JSON.parse(localStorage.getItem('axon_scripts')) || [];

        function renderScripts() {
            const list = document.getElementById('scriptList');
            list.innerHTML = '';
            scripts.forEach((s, index) => {
                list.innerHTML += `
                    <div class="script-card">
                        <div class="info">
                            <h3>${s.name}</h3>
                        </div>
                        <div class="action-btns">
                            <button class="copy-btn" onclick="copyScript('${index}')">COPY</button>
                            <button class="del-btn" onclick="deleteScript(${index})">X</button>
                        </div>
                    </div>
                `;
            });
        }

        function addScript() {
            const name = document.getElementById('scriptName').value;
            const code = document.getElementById('scriptCode').value;
            if(name && code) {
                scripts.push({name: name, code: code});
                localStorage.setItem('axon_scripts', JSON.stringify(scripts));
                document.getElementById('scriptName').value = '';
                document.getElementById('scriptCode').value = '';
                renderScripts();
                showToast("Script Added!");
            }
        }

        function copyScript(index) {
            const text = scripts[index].code;
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to Clipboard!");
            });
        }

        function deleteScript(index) {
            if(confirm("Delete this Script?")) {
                scripts.splice(index, 1);
                localStorage.setItem('axon_scripts', JSON.stringify(scripts));
                renderScripts();
            }
        }

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = ""; }, 2000);
        }

        // Search Function
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let cards = document.querySelectorAll('.script-card');
            cards.forEach(card => {
                let title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(filter) ? "" : "none";
            });
        });

        renderScripts();
    </script>
</body>
</html>
